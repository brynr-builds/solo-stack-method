# Netlify configuration for Solo Stack Method web app
# DEV NOTES (2026-06-08):
# - Why: Deploy the Next.js 14 App Router app on Netlify.
# - FIXED: removed the `/* -> /index.html` SPA-fallback redirect. That rule is WRONG for a
#   Next.js App Router app — it hijacked every dynamic route (/tools/<slug>, /go/<slug>,
#   /api/*, /admin/*) and served a static index.html, which would have broken the affiliate
#   redirect and the per-program pages. The @netlify/plugin-nextjs handles routing itself.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Next.js on Netlify plugin — owns routing for App Router (do NOT add SPA redirects).
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Environment variables to set in the Netlify dashboard:
# - DATABASE_URL                          (admin auth Postgres)
# - ADMIN_*  (see docs/solo-stack/ADMIN_AUTH.md)
# - KV_REST_API_URL / KV_REST_API_TOKEN   (durable affiliate click logging; optional)
