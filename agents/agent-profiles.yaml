# Agent Profiles — Solo Stack Method
#
# INTENT (Dev Notes):
#   Source of truth for which ROLE is assigned to which model. Roles are resolved from the dated
#   capability table below, NOT hard-coded to a model family — because frontier models change every
#   few weeks and the scaffold/harness matters as much as the base model. The weekly Agent
#   Capability Pulse keeps `capability_table` current; assignments reference roles, so swapping a
#   model is a one-line table edit, not a rewrite.
#
# Last updated: 2026-06-09 (de-pinned from the stale claude-3/gpt-4 config).

defaults:
  advisory_cycles_required_for_auto: 5
  weekly_pulse_day: Friday
  confidence_threshold_for_auto: 61
  audit_independence: strict          # builder != final auditor, always
  prefer_cross_provider_audit: true   # different provider for the audit pass (different blind spots)

# Role definitions
roles:
  Builder:
    description: "Implements features and writes code/docs."
    requires_audit: true
    can_self_audit: true            # builder self-check (lightweight)
    cannot_final_audit_own_work: true
  Auditor:
    description: "Independently reviews changes for correctness, security, intent. Runs AFTER deterministic gates pass."
    requires_evidence: true
    verdicts: [Approve, Changes_Requested, Block]
  Documentation:
    description: "Creates and maintains docs/ADRs."
    requires_audit: false
  Stabilization:
    description: "Behavior-preserving refactors / quality passes."
    requires_audit: true
    preservation_required: true

# Capability table — maintained by the weekly Capability Pulse.
# Update model_ref to current frontier; assignments below reference the ROLE, not the model.
# (Values current as of 2026-06-09; verify against official releases at each pulse.)
capability_table:
  primary_builder:
    model_ref: "claude-opus-4-x (Claude Code)"
    why: "Strong agentic coding + tool use; high SWE-bench."
    last_verified: 2026-06-09
  primary_auditor:
    model_ref: "gpt-5.x-codex (or Gemini 3.x)"
    why: "Different provider than the builder → independent blind spots for the audit pass."
    last_verified: 2026-06-09
  documentation:
    model_ref: "claude-opus-4-x"
    last_verified: 2026-06-09
  notes: >
    Pin nothing here long-term. If a pulse shows a better builder/auditor (by official release +
    observed performance, NOT self-claim), edit model_ref and bump last_verified. Weigh the harness
    (Claude Code / Codex / Cursor), not just the base model.

# Current role assignments (reference capability_table keys, not model families).
assignments:
  Builder: primary_builder
  Auditor: primary_auditor          # MUST differ from Builder's provider where possible
  Documentation: documentation

# Independence enforcement
independence:
  rule: "Builder and Auditor must be different agents (prefer different providers)."
  exceptions: []
  enforcement: strict

# Per-role advisory/auto-assignment state (human keeps final call until 5 clean cycles).
state:
  auto_assign_enabled: false
  advisory_cycles_completed:
    Builder: 0
    Auditor: 0
    Documentation: 0
  last_pulse_run: null              # set by docs/agent-capability-pulse.md run; null = never run yet
